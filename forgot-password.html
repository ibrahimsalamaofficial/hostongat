<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Hostongat</title>
    <meta name="description" content="Reset your Hostongat account password.">
    <meta name="theme-color" content="#132661">
    <link rel="shortcut icon" href="media/images/logo/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="component/component.css">
</head>
<body>
    <main class="auth-page">
        <header class="auth-header" aria-label="Site header">
            <a class="auth-logo" href="index.html" aria-label="Hostongat home">
                <img src="media/images/logo/hostongat.png" alt="Hostongat">
            </a>
            <a class="header-link" href="sign-in.html">Sign In</a>
        </header>

        <section class="auth-shell" aria-labelledby="forgot-password-title">
            <div class="auth-copy">
                <p class="auth-kicker">Account Recovery</p>
                <h1>Reset your password.</h1>
                <p>Enter the email connected to your Hostongat account and we will send password reset instructions.</p>
            </div>

            <div class="auth-panel">
                <div class="panel-heading">
                    <h2 id="forgot-password-title">Forgot Password</h2>
                    <p>Use your account email to receive a secure reset link.</p>
                </div>

                <form class="auth-form" action="#" method="post" id="resetForm">
                    <div class="field">
                        <label for="email">Email address</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="2"/><path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2"/></svg>
                            </span>
                            <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <button class="submit-button" type="submit">Send Reset Link</button>

                    <p class="auth-note">Remembered your password? <a href="sign-in.html">Back to sign in</a></p>
                    <p class="auth-note" id="resetMessage" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>
    <script src="component/component.js"></script>
</body>
</html>
