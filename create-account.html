<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Hostongat</title>
    <meta name="description" content="Create a Hostongat account to manage hosting, digital services, and project requests.">
    <meta name="theme-color" content="#132661">
    <link rel="shortcut icon" href="media/images/logo/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="component/component.css">
</head>
<body>
    <main class="auth-page">
        <header class="auth-header" aria-label="Site header">
            <a class="auth-logo" href="index.html" aria-label="Hostongat home">
                <img src="media/images/logo/hostongat.png" alt="Hostongat">
            </a>
            <a class="header-link" href="sign-in.html">Sign In</a>
        </header>

        <section class="auth-shell" aria-labelledby="create-account-title">
            <div class="auth-copy">
                <p class="auth-kicker">New Client Access</p>
                <h1>Create your account.</h1>
                <p>Set up one place for hosting, support requests, project details, and the next steps for your brand online.</p>
            </div>

            <div class="auth-panel">
                <div class="panel-heading">
                    <h2 id="create-account-title">Create Account</h2>
                    <p>Tell us where to send your account access details.</p>
                </div>

                <form class="auth-form" action="#" method="post" id="createAccountForm">
                    <div class="field">
                        <label for="name">Full name</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2"/><path d="M4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="2"/></svg>
                            </span>
                            <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="email">Email address</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="2"/><path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2"/></svg>
                            </span>
                            <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="company">Company name</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none"><path d="M4 20h16" stroke="currentColor" stroke-width="2"/><path d="M6 20V6h12v14" stroke="currentColor" stroke-width="2"/><path d="M9 10h2M13 10h2M9 14h2M13 14h2" stroke="currentColor" stroke-width="2"/></svg>
                            </span>
                            <input id="company" name="company" type="text" autocomplete="organization" placeholder="Company or project name" required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none"><path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2"/><path d="M5 11h14v9H5v-9Z" stroke="currentColor" stroke-width="2"/></svg>
                            </span>
                            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Create a password" required>
                            <button class="toggle-password" type="button" aria-controls="password" aria-label="Show password">Show</button>
                        </div>
                    </div>

                    <label class="terms">
                        <input type="checkbox" name="terms" required>
                        <span>I agree to be contacted about my Hostongat account and service requests.</span>
                    </label>

                    <button class="submit-button" type="submit">Create Account</button>

                    <p class="auth-note">Already have an account? <a href="sign-in.html">Sign in</a></p>
                    <p class="auth-note" id="authMessage" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>
    <script src="component/component.js"></script>
</body>
</html>
